name: Build Modelman App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./modelman_flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release --no-codesign

      - name: Check build output
        run: |
          echo "Build directory structure:"
          ls -la build/ || echo "build directory not found"
          echo "macOS build directory:"
          ls -la build/macos/ || echo "macOS build directory not found"
          echo "Recursive search for .app files:"
          find build -name "*.app" -type d 2>/dev/null || echo "No .app files found"

      - name: Create DMG
        run: |
          # Find the .app file
          APP_PATH=$(find build/macos -name "modelman.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Error: modelman.app not found"
            echo "Build may have failed. Checking for errors..."
            exit 1
          fi
          # Create a temporary directory for the DMG
          mkdir -p dmg_temp
          cp -R "$APP_PATH" dmg_temp/
          hdiutil create -volname "Modelman" -srcfolder dmg_temp -ov -format UDZO modelman-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelman-macos-dmg
          path: modelman_flutter/modelman-macos.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./modelman_flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create ZIP
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath modelman-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelman-windows-exe
          path: modelman_flutter/modelman-windows.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./modelman_flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelman-android-apk
          path: modelman_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelman-android-aab
          path: modelman_flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./modelman_flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Create TAR
        run: tar -czf modelman-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelman-linux
          path: modelman_flutter/modelman-linux.tar.gz
          retention-days: 30

  create-release:
    needs: [build-macos, build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version number
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: |
            artifacts/modelman-macos-dmg/modelman-macos.dmg
            artifacts/modelman-windows-exe/modelman-windows.zip
            artifacts/modelman-android-apk/app-release.apk
            artifacts/modelman-android-aab/app-release.aab
            artifacts/modelman-linux/modelman-linux.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: Automated release from ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
